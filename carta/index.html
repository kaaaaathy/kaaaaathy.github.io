<script>

    let poemContainer = document.getElementById('poem');

    async function getResponse() {
        const response = await fetch("poems.json");
        const data = await response.json(); // Extracting data as a JSON Object from the response
        const words = [].concat.apply([],data.segments.map((segment) => segment.wdlist))

        let prevEnd = 0;

        for (const word of words){
            
            await wait((word.start - prevEnd)*2000) 
            //wait for previous word to end (none, if first word)

            let newSpan = document.createElement('span');
            newSpan.innerText= word.word;
            poemContainer.appendChild(newSpan);
            newSpan.style.opacity = 1;

            
            await wait ((word.end - word.start)*2000);
            newSpan.style.opacity = 0;
            //entire duration of word

            // console.log(word.word.trim() + " ended");
            prevEnd = word.end;

        }

 }

    getResponse();

    function wait(time) {
                    return new Promise(resolve => {
                        setTimeout(() => {
                        resolve('resolved');
                        }, time);
                    });
                    }

</script>
<script type="text/javascript">

                let lat = [];

                let mineral = [];
                let type= [];
                let data;

                let mineText = document.getElementById('mineText');

                // Your Mapboxgl API Key

                    maxZoom: 18,

                    zoomOffset: -1,
                    accessToken: key
                    
                }).addTo(map);


                Papa.parse('deposit.txt',{
                    download:true,
                        complete: function(results, file) {
                        // console.log("Parsing complete:", results, file);
                        data = results.data;
                        for(let i = 1; i < data.length; i++){
                    
                            lat.push(data[i][4]);
                            lon.push(data[i][5]);
                            place.push(data[i][1]);
                            mineral.push(data[i][6]);
                            type.push(data[i][12]);

                        
                         }

                         play();
                    }
                })

                






  


                let speed = 8000;
                let delay = 0;

                    async function play(){
                        await wait(delay);
                        await animate();
                    }

                    async function animate() {

                    for (let i = 1; i < data.length - 1; i++){
                        let y = lon[i];
                        let x = lat[i];
                        let latlng = L.latLng(x, y);
                        map.setZoom(zoom);

                        map.panTo(latlng);
                        loctext.innerText = x + ", " + y + " " + place[i];
                        mineText.innerText = mineral[i] + " • " + type[i];
                        
                    
                        await wait(speed);
                    }
                    await animate();
                    }

                    function wait(time) {
                    return new Promise(resolve => {
                        setTimeout(() => {
                        resolve('resolved');
                        }, time);
                    });
                    }
