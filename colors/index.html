<html>
    <head> 
        <title>werner's</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Meddon&display=swap" rel="stylesheet">

        <script type="text/javascript" src ="papaparse.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        
        <style>
                    body {
            overflow: hidden;
            background-color: white;
            margin:0px;
            display: flex;
            flex-flow: wrap;

    


        }
        iframe{
            width:33%;
            height:50%;
            border: 0px;
            margin:0px;

        }

        </style>
    </head>

    <body>

        <audio style = "display:none" controls preload="auto" id = "noise" loop>
            <source src="wildlife_inspectorJ.wav" />
          </audio>


    
    
    </body>
    <script type="text/javascript">
              
              let noise = document.getElementById('noise');
                let started = false;
                let pressed = false;

            let swatches=6;
            let speed=8000;


                document.addEventListener('mouseover',function(){
                    if (started == false){
                            started = true;
                            noise.play();
                            animate();

                    }
                });





                    async function animate() {
                        await wait(1000);

                        for (let i = 1; i < swatches+1; i++){
                            let box=document.createElement('iframe');
                            box.src = "/swatch.html";
                            document.body.appendChild(box);
                            await wait(speed);

                        }
                    }


                    function wait(time) {
                    return new Promise(resolve => {
                        setTimeout(() => {
                        resolve('resolved');
                        }, time);
                    });
                }
                    

            </script>

</html>
