<html>
<head>
<title>things i am thinking about doing</title>
<style type="text/css">

body {
  background-image: url(rose.jpg);
  background-size: cover;
  overflow-y: hidden;
  font-family: cursive;
  cursor:grab;


}

h1 {
  text-shadow: oldlace 1px 0 10px;
  text-align: center;
}

p{
  opacity: 0;
  position: absolute;
  font-size: 30px;

}

p:hover{
  opacity:1;
  transition: 1s ease;
  cursor:pointer;

}

.touched{
  color: purple;
  opacity:1;
  cursor:grabbing;
  text-shadow: oldlace 1px 0 10px;

}

</style>
</head>


<body>
  <h1>a body, a blue love.</h1>

</body>

<script>
let desires = ["lick","taste","enter", "suck", "graze","caress"];
let where = ["lips","voids","fingers","petals","mouth"];

let acrossYou = window.innerWidth;

let alongYou = window.innerHeight;

for (let i = 0; i<desires.length;i++){
  let newDesire = document.createElement("p");
  newDesire.innerText = desires[i] + " ";
  let newPlace = where[getRandomNumber(0,where.length)];
  newDesire.innerText += newPlace;

  newDesire.style.top = getRandomNumber(0, acrossYou);

  newDesire.style.left = getRandomNumber(0, alongYou);

  newDesire.addEventListener("click", function(){
      newDesire.classList.toggle("touched");
  });



  document.body.appendChild(newDesire);
}

function getRandomNumber(min,max){
  return Math.floor(Math.random() * max + min);
}

</script>
</html>
