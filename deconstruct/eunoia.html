    let input = document.getElementById('userInput');
    let before = document.getElementById('before');
    let after = document.getElementById('after');

    let data;
    let vowel;

    function replace(letter){
        if (input.value.length > 1){
          data = input.value;
          let regex = new RegExp('[aeiuo]','g');
          console.log(regex);
          let newdata = data.replace(regex, letter);
          document.getElementById('text').innerText = newdata;

          vowel = letter;
        }

      }

    function more(){
      let currentdata = document.getElementById('text').innerText;
      let regex = new RegExp('[aeiuo]','g');
      let newdata = data.replace(regex, vowel+vowel);
      document.getElementById('text').innerText = newdata;
    }
