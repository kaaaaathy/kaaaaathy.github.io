<html>
<head>
  <link href="style.css" rel="stylesheet" type="text/css"/>

</head>


<body style = "background:papayawhip">


<h1>alphabetizer, or how to make something easier to read</h1>
<p>Paste something, like a speech, or a manuscript</p>
<textarea id = 'userInput'></textarea>

<br>

<button onclick="deconstruct()">sort</button>

<p id = "text">(your output will appear here)</p>

<script type="text/javascript">

    let input = document.getElementById('userInput');
    let data;
    // let abcString = `abcdefghijklmnopqrstuvwxyz`
    // let abc = abcString.split('');
    //this is the alphabet as an array

    function deconstruct(){
        if (input.value.length > 1){

          //store the input into variable 'data'
          data = input.value;
          //transform it all to lowercase (helps with sort)
          data = data.toLowerCase();

          let regex = /(\r\n)+|\r+|\n+/g;
          console.log(data.match(regex));

          data = data.replace(regex, ' ');

          //take the string and split it into an array
          let words = data.split(' ');

          //sort alphanumerically
          let resorted = words.sort();

          //if no repeats
          // let uniqueChars = [];
          // resorted.forEach((c) => {
          //     if (!uniqueChars.includes(c)) {
          //     uniqueChars.push(c);
          //   }
          // });

          document.getElementById('text').innerText = resorted.join(' ');
        }
    }
</script>
</body>


</html>
