<html>
    <head> 

        <link rel="stylesheet" href="leaflet.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400;1,500&family=DotGothic16&display=swap" rel="stylesheet">

        <script type="text/javascript" src ="papaparse.min.js"></script>

        <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js"
        integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg="
        crossorigin=""></script>  
        
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <style>
            body {
                background:rosybrown;
                overflow: hidden;
            }
            
            p {
                font-family:'DotGothic16';
                color:white;
            }

            #text-container{
                z-index: 401;
                display:flex;
                position:fixed;
                height:100%;
                width:100%;
                top:0;
                left:0;
                align-items: center;
                justify-content: center;


            }
            #minText{
                max-width: 800px;
                text-align: center;
                line-height: 1em;
                font-size:75px;
                letter-spacing: 1px;
            }
            #locText{
                position:fixed;bottom:0px;left:20px;font-size:20px
            }

        </style>
      
    </head>
    <body>
        <div id="map" style="height: 100%;"></div>
        <div id="text-container">
            <p id="locText"><span style="background:white;z-index:401"></p>
            <p id="minText"></p>

         </div>
    
    
    </body>
            <script type="text/javascript">

                let lat = []; 
                let lon = [];
                let place = [];
                let mineral = [];
                let data;
                let zoom = 15;
                let loctext = document.getElementById('locText');
                let minText = document.getElementById('minText');
                
                // Your Mapboxgl API Key
                let key = 'pk.eyJ1Ijoia2FhYXRoeSIsImEiOiJja3N4dHBqOTEyZDZmMm5rdDd3aDRranl2In0.4oP1N1f4Bs43c9feXjCH6g'
                let map = L.map('map').setView([-19.33,146.89], zoom);


                // Map options

                L.tileLayer('https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=pk.eyJ1Ijoia2FhYXRoeSIsImEiOiJja3N4dHBqOTEyZDZmMm5rdDd3aDRranl2In0.4oP1N1f4Bs43c9feXjCH6g', {
                    attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Imagery © <a href="https://www.mapbox.com/">Mapbox</a>',
                    maxZoom: 18,
                    id: 'mapbox/satellite-v9',
                    tileSize: 512,
                    zoomOffset: -1,
                    accessToken: key
                    
                }).addTo(map);


                Papa.parse('minfac-0-copper.txt',{
                    download:true,
                        complete: function(results, file) {
                        console.log("Parsing complete:", results, file);
                        data = results.data;
                        for(let i = 1; i < data.length; i++){
                            lat.push(data[i][10]);
                            lon.push(data[i][11]);
                            place.push(data[i][5]);
                            mineral.push(data[i][6]);
                         }

                         play();
                    }
                })

                
  


                let speed = 4000;
                let delay = 4000;

                        //resize code
                        // let cont = document.getElementById('container');
                        //     cont.style.height = window.innerHeight + "px";
                        //     window.addEventListener('resize',function(){
                        //         cont.style.height = window.innerHeight + "px";
                        // });

                    async function play(){
                        await wait(delay);
                        await animate();
                    }

                    async function animate() {

                    for (let i = 1; i < data.length - 1; i++){
                        let y = lon[i];
                        let x = lat[i];
                        let latlng = L.latLng(x, y);
                        map.setZoom(zoom);

                        map.panTo(latlng);
                        loctext.innerText = x + ", " + y + " " + place[i];
                        minText.innerText = mineral[i];

                        await wait(speed);
                    }
                    await animate();
                    }

                    function wait(time) {
                    return new Promise(resolve => {
                        setTimeout(() => {
                        resolve('resolved');
                        }, time);
                    });
                    }

               
            </script>

</html>
