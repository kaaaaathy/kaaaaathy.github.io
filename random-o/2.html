<!DOCTYPE HTML>
<html>
<head>


  <title>folio obscura | a walk through google maps</title>

  <link href="style.css" rel="stylesheet" type="text/css"/>

</head>
<body style="background-image: url('maps/inwoodhill2.png')">

  <a href="3.html">
  <div id="poem"></div>
  </a></body>

<script>

let winWidth = window.innerWidth;
let winHeight = window.innerHeight;

let words = `some moments crystallize purely
in pixel space:
a pinhole leaf camera
persists`;

// let regex = new RegExp()
let poem = words.split(/\n/);

console.log(poem);
let poemDiv = document.getElementById('poem');

poemDiv.style.top = getRandomNumber(0, winHeight - 200) +"px";
poemDiv.style.left = getRandomNumber(0, winWidth - 200) +"px";


for (let i = 0; i < poem.length;i++){
  setTimeout(function(){
    let newP = document.createElement('p');
    newP.innerText = poem[i];
    newP.classList.add("appear");
    poemDiv.appendChild(newP);

  },i*2000);
}


function getRandomNumber(min, max) {
  return Math.random() * (max - min) + min;

}

</script>
</html>
