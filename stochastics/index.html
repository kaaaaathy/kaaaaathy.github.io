<html>
<head>
<title>ghost poem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Where your poem is styled -->
<style type="text/css">
p {
  position: absolute;
}
</style>
</head>


<!-- Where your poem is built -->
<body>
  <!-- title with instructions -->
  <h1>in another universe, you are someone else</h1>
</body>


<script>

let data;
let poem;
let i = 0;

fetch('data.txt')
    .then(response => response.text())
    .then(data => {
        poem = splitTxt(data);
        buildSite();
    });


function splitTxt(input){
  //create blank Array to be returned
  let output = input.split("\n");
  for (let i=0;i < output.length;i++){
    if (output[i].length <=1){
      output.splice(i,1);
    }
  }
  console.log(output);
  return(output);
}


function buildSite(){
    document.body.addEventListener("click", function(event){
        if (i < poem.length){
          let newP = document.createElement("p");
          newP.innerText = poem[i];
          newP.style.top = event.pageY - 20;
          newP.style.left = event.pageX;
          document.body.appendChild(newP);

          i++;


        } else {
          i = 0;
        }
    });

}


</script>
</html>
